name: Copilot Agent Task

# Trigger: label an issue with "agent-task" to fire this workflow
on:
  issues:
    types: [labeled]

jobs:
  run-copilot-agent:
    if: github.event.label.name == 'agent-task'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # GitHub Copilot agent step — reads the issue body as the task spec
      # and opens a draft PR with the implementation
      - name: Run Copilot Agent
        uses: github/copilot-agent-action@v1   # replace with actual action when GA
        with:
          task: ${{ github.event.issue.body }}
          model: claude-sonnet-4-6              # or gpt-4.1 / claude-opus-4-6
          branch-prefix: agent/issue-${{ github.event.issue.number }}
          draft-pr: true
          instructions-file: .github/copilot-instructions.md

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 Copilot agent has picked up this task and opened a draft PR. Review when ready.'
            })
